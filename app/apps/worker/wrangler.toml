name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# デフォルト = テスト環境 (noda@)
# 使い方: npx wrangler deploy
# ═══════════════════════════════════════════════════════════════
account_id = "ebb7137fc6da37e2e1dc5b1719beefc9"

[assets]
directory = "dist/client"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "2d24c50a-fd1d-48a3-a50a-9b77c5178a4f"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *"]

# ═══════════════════════════════════════════════════════════════
# 本番環境 (aiagent.mini@)
# 使い方: npx wrangler deploy --env production --name your-worker-name
# D1:     npx wrangler d1 execute line-crm --env production --remote --file ...
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "ebb7137fc6da37e2e1dc5b1719beefc9"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"
run_worker_first = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "2d24c50a-fd1d-48a3-a50a-9b77c5178a4f"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["*/5 * * * *"]
